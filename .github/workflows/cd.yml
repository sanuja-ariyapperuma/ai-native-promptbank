# Continuous Deployment
#
# Triggers:
#   - Successful completion of the CI workflow (workflow_run event)
#     - CI triggered by pull_request → deploys to dev
#     - CI triggered by push to main  → deploys to prod (requires reviewer approval)
#
# Authentication: OIDC / Workload Identity Federation — no stored Azure credentials.
# Required GitHub secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#                          AZURE_ACR_NAME (login server, e.g. crpromptbankdev.azurecr.io)

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write   # OIDC token exchange
  contents: read
  actions: read     # Required to download artifacts from the CI workflow run

jobs:
  deploy-dev:
    name: Deploy to dev
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    env:
      ENVIRONMENT: dev

    steps:
      - name: Download image tag artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          path: ./artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: tag
        run: echo "value=$(cat ./artifact/image-tag.txt)" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container image to App Service
        run: |
          az webapp config container set \
            --name app-promptbank-${ENVIRONMENT} \
            --resource-group rg-promptbank-${ENVIRONMENT} \
            --container-image-name ${{ secrets.AZURE_ACR_NAME }}/promptbank:${{ steps.tag.outputs.value }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name app-promptbank-${ENVIRONMENT} \
            --resource-group rg-promptbank-${ENVIRONMENT}

  deploy-prod:
    name: Deploy to prod
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: prod
    env:
      ENVIRONMENT: prod

    steps:
      - name: Download image tag artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          path: ./artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: tag
        run: echo "value=$(cat ./artifact/image-tag.txt)" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container image to App Service
        run: |
          az webapp config container set \
            --name app-promptbank-${ENVIRONMENT} \
            --resource-group rg-promptbank-${ENVIRONMENT} \
            --container-image-name ${{ secrets.AZURE_ACR_NAME }}/promptbank:${{ steps.tag.outputs.value }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name app-promptbank-${ENVIRONMENT} \
            --resource-group rg-promptbank-${ENVIRONMENT}

