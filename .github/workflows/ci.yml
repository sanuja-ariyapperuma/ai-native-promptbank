# Continuous Integration
#
# Triggers:
#   - Push to main
#   - Pull request targeting main
#
# Authentication: OIDC is used for the Docker build+push steps.
# Required GitHub secrets (for Docker steps only):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   AZURE_ACR_NAME  — ACR login server, e.g. crpromptbankdev.azurecr.io

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write   # Required for OIDC token exchange (ACR login)

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test PromptBank.UnitTests --no-build --configuration Release

      - name: Run Playwright E2E tests
        run: dotnet test PromptBank.Tests --no-build --configuration Release

      - name: Publish
        run: dotnet publish PromptBank --no-build --configuration Release --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: promptbank-app
          path: ./publish
          retention-days: 7

      # ── Docker build & push ───────────────────────────────────────────────
      # Builds the container image and pushes it to Azure Container Registry.
      # CD retrieves the image tag from the 'image-tag' artifact to deploy.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          IMAGE_BASE=${{ secrets.AZURE_ACR_NAME }}/promptbank
          TAG=${{ steps.tag.outputs.value }}
          docker build -t "$IMAGE_BASE:$TAG" -t "$IMAGE_BASE:latest" .
          docker push "$IMAGE_BASE:$TAG"
          docker push "$IMAGE_BASE:latest"

      - name: Write image tag to file for CD
        run: echo "${{ steps.tag.outputs.value }}" > image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt
          retention-days: 7

