# docker-compose.yml — local development
#
# Usage:
#   docker compose up --build       # first run (builds the image)
#   docker compose up               # subsequent runs
#   docker compose down -v          # stop and remove the data volume
#
# The SQLite database is persisted in the named volume 'promptbank-data'
# mapped to /app/data inside the container.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/promptbank.db"
    volumes:
      - promptbank-data:/app/data

volumes:
  promptbank-data:
